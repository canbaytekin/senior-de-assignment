version: 2

models:
  - name: silver_transactions
    description: >
      SCD Type 2 transaction history derived from bronze.
      Each row is a version of a transaction, tracked via natural_key_hash.
      is_current = TRUE marks the latest version.
    columns:
      - name: transaction_sk
        description: "Surrogate key (hash of transaction_id + natural_key_hash)"
        tests:
          - unique
          - not_null

      - name: transaction_id
        description: "Application-level unique identifier in TXN-NNNN format. Used as the business key — not the Supabase internal id. Not unique in this table; multiple versions may exist per transaction."
        tests:
          - not_null

      - name: account_id
        description: "Account identifier in ACC-NNNN format. The dataset contains 20 accounts: ACC-1001 through ACC-1020."
        tests:
          - not_null

      - name: transaction_timestamp
        description: "Full UTC timestamp of the transaction, parsed from the ISO 8601 string in bronze (TIMESTAMP type)."
        tests:
          - not_null

      - name: transaction_date
        description: "Calendar date of the transaction, derived from the ISO 8601 timestamp (DATE type). All valid records fall within 2024-01-01 and 2024-03-31."
        tests:
          - not_null

      - name: amount
        description: "Transaction amount in the original currency. Must be strictly positive (> 0) and rounded to 2 decimal places."
        tests:
          - not_null

      - name: currency
        description: "ISO 4217 three-letter currency code (uppercase). Valid values: USD, EUR, GBP, CHF, JPY, AUD, CAD."
        tests:
          - not_null

      - name: transaction_type
        description: "Direction of the transaction — 'debit' or 'credit' (lowercase)."
        tests:
          - not_null

      - name: merchant_name
        description: "Name of the merchant or counterparty. Must contain at least one non-whitespace character."
        tests:
          - not_null

      - name: merchant_category
        description: "Category of the merchant (case-sensitive lowercase). 12 allowed values: e-commerce, travel, food_and_beverage, groceries, electronics, retail, entertainment, health, transportation, home_and_garden, payroll, transfer."
        tests:
          - not_null

      - name: status
        description: "Processing status of the transaction — 'completed', 'pending', 'failed', or 'reversed' (lowercase). Only 'completed' records should be included in financial summaries."
        tests:
          - not_null

      - name: country_code
        description: "ISO 3166-1 alpha-2 country code of the merchant location. Must be exactly two uppercase ASCII letters and an officially assigned code (e.g. US, GB, DE, JP, AU)."
        tests:
          - not_null

      - name: natural_key_hash
        description: "SHA-256 hash of natural-key fields; change detection key"
        tests:
          - not_null

      - name: valid_from
        description: "Timestamp when this version became effective"
        tests:
          - not_null

      - name: valid_to
        description: "Timestamp when this version was superseded (NULL if this is the current version)."

      - name: is_current
        description: "TRUE for the latest version of each transaction"
        tests:
          - not_null

      - name: version_number
        description: "Sequential version counter per transaction_id, starting at 1."
        tests:
          - not_null
